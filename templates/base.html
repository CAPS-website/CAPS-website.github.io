<!DOCTYPE html>
<html>
  <head>
    <title>CAPS</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" href="{{ get_url(path="style.css") }}">
  </head>
  <body>
    <div class="top-img">
      <img class="top-img" src="/images/foto.JPG" />
    </div>
    <nav id="menu-bar">
      <ul id="menu-list">
        <li><a class="nav-link" href="{{ get_url(path="/") }}">About</a></li>
	<li><a class="nav-link" href="{{ get_url(path="current/") }}">Current year</a></li>
        <li class="menu-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" >Competition</a>
          <ul class="dropdown-menu">
            <li><a href="{{ get_url(path="rules/") }}">Rules</a></li>
            <li><a href="{{ get_url(path="problems-and-solutions/") }}">Problems, Solutions & Rankings</a></li>
          </ul>
        </li>
        <li><a class="nav-link" href="{{ get_url(path="organizers/") }}">Organizers</a></li>
      </ul>
      <div class="logo">
        <img src="/images/logo2.png" alt="Logo">
      </div>
    </nav>
    <main class="site-content">
      {% block content %} {% endblock content %}
    </main>
  </body>
</html>
